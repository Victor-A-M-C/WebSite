<!DOCTYPE html>
<html>
<head>
<title>Victor A.M.C.</title>
<style>
body {
background-color: #DEDED2;
margin: 0;
font-family: Arial, sans-serif;
}

.split {
display: flex;
height: 50vh;
padding: 0 150px;
}

.text-side,
.image-side {
flex: 1;
display: flex;
justify-content: center;
align-items: center;
}

.text-side {
flex-direction: column;
text-align: center;
}

/* Container for the image and its label */
.image-container {
position: relative;
display: inline-block;
width: 80%; /* Sets the flexible base width */
max-width: 440px; /* Prevents the image from growing too large on massive screens */
margin-top: 240px;
}

/* Responsive scaling rule to preserve original dimension ratios */
.image-side img {
width: 100%; /* Spans full width of the wrapper container */
height: auto; /* Automatically scales the height to prevent structural warping */
display: block;
}

/* Label positioned strictly above the image, aligned to its right edge */
.top-right-label {
position: absolute;
top: -30px; /* Sits cleanly outside above the top boundary */
right: 0; /* Aligns perfectly with the right edge of the image */
font-size: 16px;
font-weight: normal;
color: #000000;
white-space: nowrap;
}

/* Keeps the link inside the label completely identical to your original text style */
.top-right-label a {
color: #000000;
text-decoration: none;
}

.text-side h1 {
font-size: 24px;
}

.text-side p {
font-size: 18px;
margin: 2px 0;
}

/* Email styling added here to remove underline and make text black */
.email-link {
color: #000000;
text-decoration: none;
}

.about-link {
color: #000000;
text-decoration: none;
font-size: 18px; /* Keeps it matching the size of your other menu items */
margin: 2px 0;
}

.art-link {
color: #000000;
text-decoration: none;
font-size: 18px; /* Keeps it matching the size of your other menu items */
margin: 2px 0;
}

.essays-link {
color: #000000;
text-decoration: none;
font-size: 18px; /* Keeps it matching the size of your other menu items */
margin: 2px 0;
}

.poems-link {
color: #000000;
text-decoration: none;
font-size: 18px; /* Keeps it matching the size of your other menu items */
margin: 2px 0;
}
</style>
</head>
<body>
<section class="split">
<div class="text-side">
<h1>Victor Anton Munteanu Ciurușniuc</h1>
<!-- Added class="email-link" and closed the missing </a> tag -->
<p><a target="_blank" href="mailto:contact.victoramc@gmail.com" rel="noopener" class="email-link">contact.victoramc@gmail.com</a></p>
<br>
<a href="about" class="about-link">About</a>
<a href="art" class="art-link">Art</a>
<a href="essays" class="essays-link">Essays</a>
<a href="poems" class="poems-link">Poems</a>
<p></p>
<p></p>
</div>

<div class="image-side">
<div class="image-container">
<!-- Added the link target pointing directly to the Romanian subfolder index -->
<div class="top-right-label"><a href="/ro/">Română</a></div>
<img src="poza2.jpg" alt="Example">
</div>
</div>
</section>
</body>
</html>
